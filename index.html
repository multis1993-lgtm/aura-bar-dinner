<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Меню - Aura Bar & Dinner</title>
    
    <!-- Зареждане на библиотеката за разлистване (PageFlip) -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <style>
        #flipbook {
    touch-action: none; /* Забранява системните жестове на телефона върху книгата */
}
        /* Базови стилове и нулиране */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d; /* Тъмен фон за целия екран */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Контейнер на книгата */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Стил за всяка страница */
        .page {
            background-color: #1a1a1a;
            color: #fff;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Снимките от менюто да запълват страницата */
        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Можеш да смениш на 'contain', ако снимките се изрязват */
            pointer-events: none;
        }

        /* Персонализирани стилове за последните 2 страници (Контакти и Резервации) */
        .custom-page {
            padding: 30px 20px;
            box-sizing: border-box;
            background-image: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
        }

        .custom-page h2 {
            color: #f7a93b; /* Златисто/оранжево, съвпадащо с твоето меню */
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-bottom: 1px solid #f7a93b;
            padding-bottom: 10px;
        }

        .custom-page p {
            font-size: 16px;
            line-height: 1.8;
            margin: 15px 0;
            color: #e0e0e0;
        }

        .custom-page a {
            color: #f7a93b;
            text-decoration: none;
            font-weight: bold;
        }

        /* Форма за резервации */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f7a93b;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: #f7a93b;
            color: #111;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.3s ease;
        }

        .btn-submit:active {
            background-color: #d18b2c;
        }

        /* Инструкция за потребителя */
        .swipe-instruction {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
            width: 100%;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="flipbook">
            <!-- Страници 1 до 10 със снимките -->
            <div class="page"><img src="1.jpg" alt="Меню Страница 1"></div>
            <div class="page"><img src="2.jpg" alt="Меню Страница 2"></div>
            <div class="page"><img src="3.jpg" alt="Меню Страница 3"></div>
            <div class="page"><img src="4.jpg" alt="Меню Страница 4"></div>
            <div class="page"><img src="5.jpg" alt="Меню Страница 5"></div>
            <div class="page"><img src="6.jpg" alt="Меню Страница 6"></div>
            <div class="page"><img src="7.jpg" alt="Меню Страница 7"></div>
            <div class="page"><img src="8.jpg" alt="Меню Страница 8"></div>
            <div class="page"><img src="9.jpg" alt="Меню Страница 9"></div>
            <div class="page"><img src="10.jpg" alt="Меню Страница 10"></div>
            <div class="page"><img src="11.jpg" alt="Меню Страница 11"></div>
            <div class="page"><img src="12.jpg" alt="Меню Страница 12"></div>

            <!-- Страница 11: Контакти -->
            <div class="page custom-page">
                <h2>Контакти</h2>
                <p>📍 <strong>Адрес:</strong><br> гр. Елхово, [Твоят Адрес Тук]</p>
                <p>📞 <strong>Телефон:</strong><br> <a href="tel:+359888000000">0888 00 00 00</a></p>
                <p>📧 <strong>Имейл:</strong><br> <a href="mailto:info@aurabar.bg">info@aurabar.bg</a></p>
                <p>🕒 <strong>Работно време:</strong><br> Понеделник - Неделя<br> 08:00 - 24:00 ч.</p>
            </div>

            <!-- Страница 12: Резервации -->
            <div class="page custom-page">
                <h2>Резервация</h2>
                <form action="#" method="POST" onsubmit="alert('Заявката е изпратена успешно!'); return false;">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="Вашето име" required>
                    </div>
                    <div class="form-group">
                        <input type="tel" name="phone" placeholder="Телефонен номер" required>
                    </div>
                    <div class="form-group">
                        <input type="number" name="people" placeholder="Брой хора" min="1" max="20" required>
                    </div>
                    <div class="form-group">
                        <input type="datetime-local" name="date" required>
                    </div>
                    <button type="submit" class="btn-submit">Запази маса</button>
                </form>
            </div>
        </div>
    </div>

    <div class="swipe-instruction">Плъзнете за разглеждане 👈👉</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Инициализация на библиотеката за разлистване
            const pageFlip = new St.PageFlip(document.getElementById('flipbook'), {
    width: 400, 
    height: 600, 
    size: "stretch", 
    minWidth: 300,
    maxWidth: 600,
    minHeight: 400,
    maxHeight: 900,
    maxShadowOpacity: 0.2, // Намаляваме изчисляването на сенките, за да върви леко
    showCover: true, 
    mobileScrollSupport: false,
    usePortrait: true,
    flippingTime: 600, // Ускоряваме скоростта на страницата (по подразбиране е 1000)
    swipeDistance: 50, // Увеличаваме съпротивлението: иска се по-категорично плъзгане
    clickEventForward: true // Позволява прелистване и само с едно докосване в края на екрана
});

            // Зареждане на страниците от HTML структурата
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
        });
    </script>
</body>
</html>
