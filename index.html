<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Меню - Aura Bar & Dinner</title>
    
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; 
        }

        /* ------------------------- */
        /* ЗАРЕЖДАЩ ЕКРАН (LOADER)   */
        /* ------------------------- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0d0d;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loader-content {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Огнено/златно колело */
        .glow-ring {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top: 3px solid #f7a93b;
            border-bottom: 3px solid #f7a93b;
            box-shadow: 0 0 20px rgba(247, 169, 59, 0.6), inset 0 0 20px rgba(247, 169, 59, 0.6);
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Текст в зареждащия екран */
        .brand-text {
            text-align: center;
            color: #f7a93b;
            z-index: 10;
            animation: pulseText 2s infinite alternate;
        }

        .brand-text h1 {
            margin: 0;
            font-size: 38px;
            letter-spacing: 6px;
            text-shadow: 0 0 15px #f7a93b;
            font-weight: bold;
        }

        .brand-text h2 {
            margin: 0;
            font-size: 14px;
            letter-spacing: 4px;
            font-weight: normal;
            margin-top: 5px;
        }

        @keyframes pulseText {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* ------------------------- */
        /* ФЕЙСБУК ЛИНК (ГОРЕ)       */
        /* ------------------------- */
        .top-bar {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 100;
        }

        .top-bar a {
            color: #f7a93b;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: textGlow 1.2s infinite alternate;
        }

        @keyframes textGlow {
            0% { opacity: 0.7; text-shadow: 0 0 5px #f7a93b; }
            100% { opacity: 1; text-shadow: 0 0 15px #f7a93b, 0 0 25px #f7a93b; }
        }

        /* ------------------------- */
        /* КНИГА И СТРАНИЦИ          */
        /* ------------------------- */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page {
            background-color: #1a1a1a;
            color: #fff;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .custom-page {
            padding: 30px 20px;
            box-sizing: border-box;
            background-image: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .custom-page h2 {
            color: #f7a93b;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-bottom: 1px solid #f7a93b;
            padding-bottom: 10px;
        }

        .custom-page p {
            font-size: 16px;
            line-height: 1.8;
            margin: 15px 0;
            color: #e0e0e0;
            text-align: center;
        }

        .custom-page a {
            color: #f7a93b;
            text-decoration: none;
            font-weight: bold;
        }

        .swipe-instruction {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
            width: 100%;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- ЗАРЕЖДАЩ ЕКРАН -->
    <div id="loader">
        <div class="loader-content">
            <div class="glow-ring"></div>
            <div class="brand-text">
                <h1>AURA</h1>
                <h2>BAR & DINNER</h2>
            </div>
        </div>
    </div>

    <!-- ФЕЙСБУК ЛИНК НАЙ-ОТГОРЕ -->
    <div class="top-bar">
        <!-- Смени линка в href="..." с истинския адрес на фейсбук страницата -->
        <a href="https://www.facebook.com/profile.php?id=61570644003870" target="_blank">Посетете нашата фейсбук страница</a>
    </div>

    <div class="container">
        <div id="flipbook">
            <!-- Страници със снимки -->
            <div class="page"><img src="1.jpg" alt="Меню Страница 1"></div>
            <div class="page"><img src="2.jpg" alt="Меню Страница 2"></div>
            <div class="page"><img src="3.jpg" alt="Меню Страница 3"></div>
            <div class="page"><img src="4.jpg" alt="Меню Страница 4"></div>
            <div class="page"><img src="5.jpg" alt="Меню Страница 5"></div>
            <div class="page"><img src="6.jpg" alt="Меню Страница 6"></div>
            <div class="page"><img src="7.jpg" alt="Меню Страница 7"></div>
            <div class="page"><img src="8.jpg" alt="Меню Страница 8"></div>
            <div class="page"><img src="9.jpg" alt="Меню Страница 9"></div>
            <div class="page"><img src="10.jpg" alt="Меню Страница 10"></div>
            <div class="page"><img src="11.jpg" alt="Меню Страница 11"></div>
            <div class="page"><img src="12.jpg" alt="Меню Страница 12"></div>

            <!-- Страница 11: Контакти (Резервациите са премахнати) -->
            <div class="page custom-page">
                <h2>Контакти</h2>
                <p>📍 <strong>Адрес:</strong><br> <a href="https://www.google.com/maps/search/?api=1&query=гр.+Елхово,+ул.+Търговска+7">гр. Елхово, ул. Търговска 7</a></p>
                <p>📞 <strong>Телефон:</strong><br> <a href="tel:+35987 786 6605">087 786 6605</a></p>
                <p>📧 <strong>Имейл:</strong><br> <a href="mailto:info@aurabar.bg">info@aurabar.bg</a></p>
                <p>🕒 <strong>Работно време:</strong><br> Вторник - Неделя<br> 09:00 - 24:00 ч.</p>
            </div>
        </div>
    </div>

    <div class="swipe-instruction">Плъзнете за разглеждане 👈👉</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Премахване на зареждащия екран след 2.5 секунди
            setTimeout(function() {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }, 2500);

            // Инициализация на библиотеката за разлистване
            const pageFlip = new St.PageFlip(document.getElementById('flipbook'), {
                width: 400, 
                height: 600, 
                size: "stretch", 
                minWidth: 300,
                maxWidth: 600,
                minHeight: 400,
                maxHeight: 900,
                maxShadowOpacity: 0.2, // По-малко сенки за по-леко вървене
                showCover: true, 
                mobileScrollSupport: false,
                usePortrait: true,
                flippingTime: 600, // По-бързо прелистване
                swipeDistance: 50, // По-малко чувствително
                clickEventForward: true 
            });

            // Зареждане на страниците от HTML структурата
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
        });
    </script>
</body>
</html>
